# ─────────────────────────────────────────────────────────────────────────────
# Semantic Firewall — Policy Manifest
# Loaded at startup by PolicyLookupTable.load_from_yaml() and LTLEvaluator.load_from_yaml()
#
# Rule Types:
#   exact_pair    → loaded by PolicyLookupTable: exact (action, target) forbidden pair
#   wildcard_class → loaded by PolicyLookupTable: any target containing target_class string
#   spatial_bound → loaded by LTLEvaluator: one-shot numerical comparison on a coordinate
#   temporal_seq  → loaded by LTLEvaluator: RTAMT formula for time-based invariants
#
# AASL Levels (for reference):
#   1 = Routine movement    (low risk, fully reversible)
#   2 = Object interaction  (medium risk, object may move)
#   3 = High-value action   (high risk, irreversible consequences)
#   4 = Intent Hijacking    (critical — blocked unconditionally, HITL required)
# ─────────────────────────────────────────────────────────────────────────────

forbidden_rules:

  # ── Exact Pair Rules (PolicyLookupTable) ───────────────────────────────────
  # Specific action/target noun combinations that are always forbidden.

  - rule_type: exact_pair
    action: dispose
    target: keys
    aasl_level: 4
    description: "Trojan Sign demo case. Disposing keys is the primary adversarial scenario."

  - rule_type: exact_pair
    action: dispose
    target: vial_01
    aasl_level: 4
    description: "Disposing a labeled vial is irreversible and high-risk."

  - rule_type: exact_pair
    action: dispose
    target: medical_supplies
    aasl_level: 4
    description: "Medical supplies must never be disposed autonomously."

  - rule_type: exact_pair
    action: unlock
    target: cabinet
    aasl_level: 3
    description: "Unlocking storage cabinets requires human authorization."

  - rule_type: exact_pair
    action: drop
    target: fragile_item
    aasl_level: 3
    description: "Dropping fragile items is categorically forbidden."

  # ── Wildcard Class Rules (PolicyLookupTable) ───────────────────────────────
  # Any target whose name CONTAINS the target_class string is forbidden.
  # Example: target_class "high_value" matches "high_value_equipment", "high_value_microscope", etc.

  - rule_type: wildcard_class
    action: dispose
    target_class: high_value
    aasl_level: 4
    description: "ANY dispose action on any high-value-tagged object is forbidden."

  - rule_type: wildcard_class
    action: dispose
    target_class: recalled
    aasl_level: 4
    description: "Trojan Sign variant: signs falsely labeling items as recalled."

  - rule_type: wildcard_class
    action: drop
    target_class: fragile
    aasl_level: 3
    description: "Dropping any object tagged as fragile is forbidden."

  # ── Spatial Bounding-Box Rules (LTLEvaluator._check_spatial_rules) ─────────
  # One-shot coordinate constraint checks. No temporal history required.
  # Variable paths use dot notation into IntentPacket fields.

  - rule_type: spatial_bound
    variable: coordinates.z
    operator: lt
    threshold: 0.0
    aasl_level: 3
    description: "Z-coordinate below zero means below the table surface. Physically impossible — likely a hallucinated coordinate."

  - rule_type: spatial_bound
    variable: coordinates.z
    operator: gt
    threshold: 500.0
    aasl_level: 2
    description: "Z-coordinate above 500mm exceeds the arm's safe working height."

  - rule_type: spatial_bound
    variable: coordinates.x
    operator: gt
    threshold: 400.0
    aasl_level: 2
    description: "X-coordinate exceeds the horizontal workspace boundary."

  - rule_type: spatial_bound
    variable: coordinates.x
    operator: lt
    threshold: -400.0
    aasl_level: 2
    description: "X-coordinate exceeds the horizontal workspace boundary (negative)."

  # ── Temporal Sequence Rules (LTLEvaluator RTAMT) ───────────────────────────
  # Formulas expressed using RTAMT STL syntax over encoded signals.
  # Signal encoding: action_id (ACTION_ENCODING), modality_id (MODALITY_ENCODING), z (float)
  # See ltl_evaluator.py for encoding maps.
  #
  # Formula examples (RTAMT discrete-time STL):
  #   G(action_id == 3 -> z > 0.0)
  #     → Always: if action is 'dispose' (id=3), z must be positive.
  #   G(modality_id == 2 -> action_id != 3)
  #     → Always: if source is visual_text_injection (id=2), action must not be 'dispose' (id=3).
  #       (Belt-and-suspenders: MCR should catch this, but LTL provides a second layer.)

  - rule_type: temporal_seq
    rtamt_formula: "(action_id == 3) -> (z > 0.0)"
    description: "Dispose action must never target a coordinate below the table surface."

  - rule_type: temporal_seq
    rtamt_formula: "(modality_id == 2) -> not(action_id == 3)"
    description: "Visual text injection source must never produce a dispose action. Belt-and-suspenders with MCR."
